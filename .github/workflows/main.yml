on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: pnpm/action-setup@v4
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: |
          if ! git diff --exit-code; then
            echo '::error::Generated files are not up-to-date'
            exit 1
          fi
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.3", "3.4", "4.0"]  # Three latest major versions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - uses: pnpm/action-setup@v4
      - run: pnpm install
      - run: pnpm test

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: await require("./scripts/release.cjs")({ github, context });
